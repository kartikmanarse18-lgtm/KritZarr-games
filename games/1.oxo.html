<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OXO: NEON PROTOCOL HYPER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #020205;
        }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            touch-action: manipulation;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }

        /* Bot Styling & Animations */
        #chibi-bot {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 50;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            left: 0;
            top: 0;
            color: var(--neon-blue);
        }

        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(5deg); } }
        @keyframes hyper-spin { 
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 1; } 
            100% { transform: translate(-50%, -50%) rotate(1080deg) scale(2); opacity: 1; } 
        }
        @keyframes shockwave { 0% { transform: scale(0.5); opacity: 1; border-width: 20px; } 100% { transform: scale(4); opacity: 0; border-width: 0px; } }
        @keyframes screen-shake { 0%, 100% { transform: translate(0, 0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-5px, -5px); } 20%, 40%, 60%, 80% { transform: translate(5px, 5px); } }
        
        .bot-idle { animation: float 3s ease-in-out infinite; }
        .bot-victory { 
            position: fixed !important; 
            left: 50% !important; 
            top: 50% !important; 
            animation: hyper-spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards !important; 
            z-index: 300; 
        }
        .shake { animation: screen-shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* Cells & Effects */
        .cell {
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 1);
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            transition: all 0.2s;
            cursor: pointer;
        }

        .winning-cell {
            background: var(--win-bg) !important;
            box-shadow: 0 0 30px var(--win-glow);
            border-color: var(--win-glow) !important;
            z-index: 10;
            transform: scale(1.05);
        }

        .glitch-text {
            position: relative;
            animation: text-pulse 1s infinite alternate;
        }
        @keyframes text-pulse { from { transform: scale(1); text-shadow: 0 0 10px currentColor; } to { transform: scale(1.1); text-shadow: 0 0 30px currentColor; } }

        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 2px;
            z-index: 250;
        }

        #shockwave-ring {
            position: fixed;
            left: 50%;
            top: 50%;
            width: 100px;
            height: 100px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0;
            z-index: 280;
        }
        .active-ring { animation: shockwave 0.8s ease-out forwards; }

        .step { display: none; }
        .step.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body>

    <!-- OVERLAY MENUS -->
    <div id="setup-modal" class="fixed inset-0 z-[500] bg-black flex items-center justify-center p-8">
        <div class="w-full max-w-sm">
            <div id="step-1" class="step active flex-col text-center">
                <h1 class="orbitron text-4xl font-black mb-10 tracking-[0.2em] text-cyan-400">OXO HYPER</h1>
                <button onclick="nextStep(2, 'ai')" class="w-full mb-4 py-6 border border-cyan-500/30 bg-cyan-500/5 rounded-3xl orbitron font-bold">AI VS YOU</button>
                <button onclick="nextStep(2, 'pvp')" class="w-full py-6 border border-pink-500/30 bg-pink-500/5 rounded-3xl orbitron font-bold text-pink-500">FRIEND VS FRIEND</button>
            </div>
            <div id="step-2" class="step flex-col">
                <h1 class="orbitron text-xs font-black mb-8 text-center text-gray-500 uppercase tracking-widest">ID Authentication</h1>
                <input id="p1-input" type="text" placeholder=" NAME " class="w-full bg-white/5 border-b border-cyan-500 p-5 mb-4 outline-none orbitron text-center uppercase text-cyan-400">
                <input id="p2-input" type="text" placeholder="FRIENDS NAME" class="w-full bg-white/5 border-b border-pink-500 p-5 mb-10 outline-none orbitron text-center uppercase text-pink-400">
                <button onclick="handleNames()" class="w-full py-5 bg-cyan-500 text-black orbitron font-black rounded-2xl shadow-lg">INITIALIZE</button>
            </div>
            <div id="step-3" class="step flex-col">
                <h1 class="orbitron text-xs font-black mb-8 text-center text-gray-500 uppercase tracking-widest">Core Difficulty</h1>
                <button onclick="startGame(1)" class="w-full mb-3 p-5 border border-white/10 rounded-2xl orbitron text-[10px] hover:bg-white/5 uppercase">Novice</button>
                <button onclick="startGame(2)" class="w-full mb-3 p-5 border border-white/10 rounded-2xl orbitron text-[10px] hover:bg-white/5 uppercase">Tactical</button>
                <button onclick="startGame(3)" class="w-full p-5 border border-cyan-500 bg-cyan-500/10 rounded-2xl orbitron text-[10px] text-cyan-400 uppercase">God Mode</button>
            </div>
        </div>
    </div>

    <!-- GAMEPLAY VIEW -->
    <main id="game-container" class="flex-1 flex flex-col p-6 max-w-lg mx-auto w-full">
        <header class="flex justify-between items-center mb-8">
            <div class="flex flex-col">
                <span id="display-p1" class="font-black text-cyan-400 orbitron">PILOT_X</span>
                <span id="score-p1" class="text-3xl font-black orbitron">0</span>
            </div>
            <div id="hud-ring" class="p-1 rounded-full border-2 border-white/10 transition-all duration-500">
                <div class="bg-white/5 px-6 py-2 rounded-full">
                    <span id="turn-txt" class="orbitron text-[10px] font-black uppercase tracking-widest">Awaiting</span>
                </div>
            </div>
            <div class="flex flex-col text-right">
                <span id="display-p2" class="font-black text-pink-400 orbitron">PILOT_O</span>
                <span id="score-p2" class="text-3xl font-black orbitron">0</span>
            </div>
        </header>

        <div id="arena" class="flex-1 flex items-center justify-center relative bg-white/[0.02] rounded-[3rem] border border-white/5 shadow-2xl overflow-hidden">
            <div id="chibi-bot" class="bot-idle">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="45" r="35" fill="black" stroke="currentColor" stroke-width="4" id="bot-frame" />
                    <g fill="currentColor" id="bot-eyes">
                        <ellipse cx="35" cy="42" rx="4" ry="7"><animate attributeName="ry" values="7;1;7" dur="3s" repeatCount="indefinite" /></ellipse>
                        <ellipse cx="65" cy="42" rx="4" ry="7"><animate attributeName="ry" values="7;1;7" dur="3s" repeatCount="indefinite" /></ellipse>
                    </g>
                    <path d="M42 62 Q50 67 58 62" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" />
                    <path d="M25 82 L75 82 L80 95 L20 95 Z" fill="#ff00ff" opacity="0.6" />
                </svg>
            </div>

            <div id="grid" class="grid grid-cols-3 gap-3 w-full aspect-square max-w-[320px] p-4 relative z-10">
                <div class="cell rounded-3xl" onclick="handleTap(0)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(1)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(2)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(3)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(4)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(5)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(6)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(7)"></div>
                <div class="cell rounded-3xl" onclick="handleTap(8)"></div>
            </div>
        </div>

        <footer class="mt-8 flex gap-4">
            <button onclick="location.reload()" class="flex-1 p-5 border border-white/10 rounded-3xl orbitron text-[10px] text-gray-500 uppercase tracking-widest">Exit</button>
            <button onclick="resetStats()" class="flex-1 p-5 bg-white/5 border border-white/10 rounded-3xl orbitron text-[10px] uppercase tracking-widest">Wipe Data</button>
        </footer>
    </main>

    <!-- VICTORY SCREEN -->
    <div id="victory-overlay" class="fixed inset-0 z-[400] hidden flex-col items-center justify-center bg-black/95">
        <div id="shockwave-ring"></div>
        <div class="relative z-[410] text-center">
            <p class="orbitron text-cyan-400 text-[10px] tracking-[0.5em] mb-4 uppercase">Protocol Complete</p>
            <h2 id="winner-name" class="orbitron text-6xl font-black mb-8 italic glitch-text">PILOT</h2>
            <div class="flex gap-4 justify-center">
                <button onclick="initGame()" class="px-12 py-5 bg-white text-black orbitron font-black rounded-2xl hover:bg-cyan-400 transition-colors">NEXT MISSION</button>
            </div>
        </div>
    </div>

    <script>
        let conf = { mode: 'ai', p1: 'X', p2: 'O', lvl: 3 };
        let state = { board: Array(9).fill(''), turn: 'X', active: false, s1: 0, s2: 0, botThinking: false };

        function nextStep(s, v) {
            if (s === 2) { 
                conf.mode = v; 
                document.getElementById('p2-input').style.display = v === 'pvp' ? 'block' : 'none';
            }
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${s}`).classList.add('active');
        }

        function handleNames() {
            conf.p1 = document.getElementById('p1-input').value.toUpperCase() || 'PILOT_X';
            conf.p2 = conf.mode === 'pvp' ? (document.getElementById('p2-input').value.toUpperCase() || 'PILOT_O') : 'SYSTEM_AI';
            if (conf.mode === 'ai') nextStep(3);
            else startGame();
        }

        function startGame(l = 1) {
            conf.lvl = l;
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('display-p1').innerText = conf.p1;
            document.getElementById('display-p2').innerText = conf.p2;
            initGame();
        }

        function initGame() {
            // Reset Logical State
            state.board = Array(9).fill('');
            state.turn = 'X';
            state.active = true;
            state.botThinking = false;
            
            // UI Clean Up
            const overlay = document.getElementById('victory-overlay');
            overlay.classList.add('hidden');
            overlay.style.display = 'none';
            document.getElementById('shockwave-ring').classList.remove('active-ring');
            
            document.querySelectorAll('.cell').forEach(c => {
                c.innerText = '';
                c.className = 'cell rounded-3xl';
                c.style.cssText = '';
            });

            // Re-center Bot
            const bot = document.getElementById('chibi-bot');
            bot.classList.remove('bot-victory');
            bot.classList.add('bot-idle');
            bot.style.position = 'absolute';
            bot.style.left = '0';
            bot.style.top = '0';
            bot.style.transform = '';
            
            updateHUD();
            
            // Positioning Delay for Layout recalculation
            setTimeout(() => { if (state.active) animateBot(4); }, 100);
        }

        function handleTap(i) {
            if (!state.active || state.board[i] !== '' || state.botThinking) return;
            
            executeMove(i, state.turn);

            if (state.active && conf.mode === 'ai' && state.turn === 'O') {
                state.botThinking = true;
                setTimeout(() => {
                    if (!state.active) return;
                    const aiIdx = getBestMove();
                    executeMove(aiIdx, 'O');
                    state.botThinking = false;
                }, 600);
            }
        }

        function executeMove(i, char) {
            state.board[i] = char;
            const cells = document.querySelectorAll('.cell');
            cells[i].innerText = char;
            cells[i].style.color = char === 'X' ? 'var(--neon-blue)' : 'var(--neon-pink)';
            cells[i].style.textShadow = `0 0 20px ${char === 'X' ? 'var(--neon-blue)' : 'var(--neon-pink)'}`;
            
            animateBot(i);
            
            const win = checkWin(state.board);
            if (win) {
                triggerVictory(win);
            } else {
                state.turn = state.turn === 'X' ? 'O' : 'X';
                updateHUD();
            }
        }

        function animateBot(idx) {
            const bot = document.getElementById('chibi-bot');
            if (bot.classList.contains('bot-victory')) return;

            const target = document.querySelectorAll('.cell')[idx];
            if (!target) return;
            
            const arena = document.getElementById('arena').getBoundingClientRect();
            const rect = target.getBoundingClientRect();
            
            const x = (rect.left + rect.width/2) - arena.left - 30;
            const y = (rect.top + rect.height/2) - arena.top - 30;
            
            bot.style.transform = `translate(${x}px, ${y}px)`;
        }

        function updateHUD() {
            const isX = state.turn === 'X';
            const color = isX ? 'var(--neon-blue)' : 'var(--neon-pink)';
            document.getElementById('turn-txt').innerText = isX ? conf.p1 : conf.p2;
            document.getElementById('turn-txt').style.color = color;
            document.getElementById('hud-ring').style.borderColor = color;
            document.getElementById('chibi-bot').style.color = color;
            document.getElementById('score-p1').innerText = state.s1;
            document.getElementById('score-p2').innerText = state.s2;
        }

        function triggerVictory(res) {
            state.active = false;
            const bot = document.getElementById('chibi-bot');
            const overlay = document.getElementById('victory-overlay');
            const nameEl = document.getElementById('winner-name');
            const color = res.winner === 'X' ? 'var(--neon-blue)' : (res.winner === 'O' ? 'var(--neon-pink)' : '#ffffff');

            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 500);

            if (res.winner === 'X') state.s1++; else if (res.winner === 'O') state.s2++;
            updateHUD();

            if (res.path) {
                res.path.forEach(idx => {
                    const c = document.querySelectorAll('.cell')[idx];
                    c.classList.add('winning-cell');
                    c.style.setProperty('--win-bg', res.winner === 'X' ? 'rgba(0,243,255,0.1)' : 'rgba(255,0,255,0.1)');
                    c.style.setProperty('--win-glow', color);
                });
            }

            setTimeout(() => {
                bot.style.transform = '';
                bot.classList.remove('bot-idle');
                bot.classList.add('bot-victory');
                bot.style.color = color;
                
                setTimeout(() => {
                    document.getElementById('shockwave-ring').classList.add('active-ring');
                    document.getElementById('shockwave-ring').style.borderColor = color;
                    createParticles(color);
                    
                    overlay.classList.remove('hidden');
                    overlay.style.display = 'flex';
                    if (res.winner === 'T') {
                        nameEl.innerText = "DRAW";
                        nameEl.style.color = "white";
                    } else {
                        nameEl.innerText = res.winner === 'X' ? conf.p1 : conf.p2;
                        nameEl.style.color = color;
                    }
                }, 800);
            }, 300);
        }

        function createParticles(color) {
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 12 + 4;
                p.style.width = size + 'px';
                p.style.height = '2px';
                p.style.background = color;
                p.style.left = '50%';
                p.style.top = '50%';
                const angle = Math.random() * Math.PI * 2;
                const dist = 300 + Math.random() * 500;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                document.body.appendChild(p);
                p.animate([
                    { transform: `translate(-50%, -50%) rotate(${angle}rad) translateX(0)`, opacity: 1 },
                    { transform: `translate(-50%, -50%) rotate(${angle}rad) translateX(${tx}px) translateY(${ty}px)`, opacity: 0 }
                ], { duration: 800 + Math.random() * 1000, easing: 'ease-out' }).onfinish = () => p.remove();
            }
        }

        function checkWin(b) {
            const paths = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let p of paths) {
                if (b[p[0]] && b[p[0]] === b[p[1]] && b[p[0]] === b[p[2]]) return { winner: b[p[0]], path: p };
            }
            return b.includes('') ? null : { winner: 'T' };
        }

        function getBestMove() {
            if (conf.lvl === 1) {
                const a = state.board.map((v,i)=>v===''?i:null).filter(v=>v!==null);
                return a[Math.floor(Math.random()*a.length)];
            }
            if (conf.lvl === 2) {
                let m = findImmediateWin('O') || findImmediateWin('X');
                if (m !== null) return m;
                const a = state.board.map((v,i)=>v===''?i:null).filter(v=>v!==null);
                return a[Math.floor(Math.random()*a.length)];
            }
            return minimax(state.board, 0, true).index;
        }

        function findImmediateWin(p) {
            for(let i=0; i<9; i++) {
                if(state.board[i]==='') {
                    state.board[i]=p;
                    const w = checkWin(state.board);
                    state.board[i]='';
                    if(w && w.winner === p) return i;
                }
            }
            return null;
        }

        function minimax(nb, d, isM) {
            const r = checkWin(nb);
            if (r?.winner === 'O') return { score: 10 - d };
            if (r?.winner === 'X') return { score: d - 10 };
            if (!nb.includes('')) return { score: 0 };
            const moves = [];
            const avail = nb.map((v,i)=>v===''?i:null).filter(v=>v!==null);
            for(let i=0; i<avail.length; i++) {
                const m = { index: avail[i] };
                nb[avail[i]] = isM ? 'O' : 'X';
                m.score = minimax(nb, d+1, !isM).score;
                nb[avail[i]] = '';
                moves.push(m);
            }
            let best;
            if(isM) {
                let s = -Infinity;
                for(let m of moves) { if(m.score > s) { s = m.score; best = m; } }
            } else {
                let s = Infinity;
                for(let m of moves) { if(m.score < s) { s = m.score; best = m; } }
            }
            return best;
        }

        function resetStats() {
            state.s1 = 0;
            state.s2 = 0;
            updateHUD();
        }
    </script>
</body>
</html>
